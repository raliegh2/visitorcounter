name: Patch dashboard migration

on:
  push:
    branches:
      - fix/ci-security-workflows

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/ci-security-workflows
          fetch-depth: 0
      - name: Quote reserved output column
        shell: python
        run: |
          from pathlib import Path

          path = Path('supabase/migrations/202606230003_application_functions.sql')
          source = path.read_text(encoding='utf-8')
          old = '  returning bigint,\n  visitor_records bigint'
          new = '  "returning" bigint,\n  visitor_records bigint'
          if old not in source:
              raise SystemExit('Expected dashboard_metrics output definition was not found.')
          path.write_text(source.replace(old, new, 1), encoding='utf-8')
      - name: Commit migration correction
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/migrations/202606230003_application_functions.sql
          git commit -m "fix: quote dashboard returning metric"
          git push origin HEAD:fix/ci-security-workflows
