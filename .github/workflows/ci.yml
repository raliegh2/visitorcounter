name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  application:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://example.invalid
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-publishable-placeholder-1234567890
          NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
          SUPABASE_SERVICE_ROLE_KEY: ci-service-role-placeholder-1234567890
          REAUTH_COOKIE_SECRET: ci-cookie-placeholder-12345678901234567890
      - run: npm audit --audit-level=high

  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Start local database only
        run: supabase db start
      - name: Run pgTAP database tests
        run: supabase test db
