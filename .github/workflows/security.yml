name: Security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "30 4 * * 1"

permissions:
  contents: read

jobs:
  source-and-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npm run security:source
      - run: npm audit --audit-level=high
      - name: Gitleaks current source-tree scan
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.0
          dir --config=/repo/.gitleaks.toml --redact --exit-code 1 /repo
      - name: Gitleaks pull-request commit-range scan
        if: github.event_name == 'pull_request'
        run: >-
          docker run --rm
          -v "$PWD:/repo"
          ghcr.io/gitleaks/gitleaks:v8.30.0
          git --config=/repo/.gitleaks.toml --redact --exit-code 1
          --log-opts="${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}"
          /repo

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read
    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
      - uses: github/codeql-action/analyze@v3

  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Check Dependency Graph availability
        id: dependency-graph
        uses: actions/github-script@v7
        with:
          script: |
            const pull = context.payload.pull_request;
            try {
              await github.request('GET /repos/{owner}/{repo}/dependency-graph/compare/{basehead}', {
                owner: context.repo.owner,
                repo: context.repo.repo,
                basehead: `${pull.base.sha}...${pull.head.sha}`,
                headers: { 'X-GitHub-Api-Version': '2022-11-28' }
              });
              core.setOutput('available', 'true');
            } catch (error) {
              core.warning(`Dependency Graph API unavailable (${error.status ?? 'unknown'}). npm audit remains the blocking dependency vulnerability check.`);
              core.setOutput('available', 'false');
            }
      - name: Dependency Review
        if: steps.dependency-graph.outputs.available == 'true'
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high
          comment-summary-in-pr: always
          retry-on-snapshot-warnings: true
          retry-on-snapshot-warnings-timeout: 120
      - name: Dependency Review prerequisite notice
        if: steps.dependency-graph.outputs.available != 'true'
        run: echo "::warning::Enable GitHub Dependency Graph to activate pull-request dependency diffing. npm audit and Dependabot remain active."
